name: Build and Deploy to AKS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: bankingappdevacr31065
  ACR_LOGIN_SERVER: bankingappdevacr31065.azurecr.io
  AKS_CLUSTER_NAME: banking-app-dev-aks
  RESOURCE_GROUP: rg-banking-app-dev
  NAMESPACE: banking-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name $ACR_NAME

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api-service
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $ACR_LOGIN_SERVER/api-service:${IMAGE_TAG} \
            ./api-service \
            --push

      - name: Build and push worker-service
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $ACR_LOGIN_SERVER/worker-service:${IMAGE_TAG} \
            ./worker-service \
            --push


      - name: Build and push ai-analyzer-service
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $ACR_LOGIN_SERVER/ai-analyzer-service:${IMAGE_TAG} \
            ./ai-analyzer-service \
            --push      

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group $RESOURCE_GROUP --name $AKS_CLUSTER_NAME --overwrite-existing

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy with Helm
        run: |
          helm upgrade --install banking-app ./helm/banking-app \
            -n $NAMESPACE \
            --create-namespace \
            --set apiService.image.repository=$ACR_LOGIN_SERVER/api-service \
            --set apiService.image.tag=$IMAGE_TAG \
            --set workerService.image.repository=$ACR_LOGIN_SERVER/worker-service \
            --set workerService.image.tag=$IMAGE_TAG \
            --set aiAnalyzerService.image.repository=$ACR_LOGIN_SERVER/ai-analyzer-service \
            --set aiAnalyzerService.image.tag=$IMAGE_TAG
